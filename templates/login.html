<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mahadev Fitness Club</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Background Video -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="{{ url_for('static', filename='gym-bg.mp4') }}" type="video/mp4">
</video>

<!-- Background Music -->
<audio id="bg-music" autoplay muted loop>
    <source src="{{ url_for('static', filename='music2.mp3') }}" type="audio/mpeg">
</audio>

<div class="page-center">
    <div class="container glass" style="max-width: 450px; animation: fadeInUp 0.6s ease;">
        
        <!-- Logo Section -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="logo-icon" style="font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 0 20px var(--primary));">
                🏋️
            </div>
            <h1 class="logo-text" style="font-size: 2rem; margin-bottom: 0.5rem;">
                MAHADEV <span class="highlight">FITNESS</span>
            </h1>
            <p style="color: var(--text-muted); font-size: 1rem;">
                Gym Management System
            </p>
        </div>

        <h2 class="form-title" style="font-size: 1.75rem; margin-bottom: 1.5rem;">Admin Login</h2>

        {% if error %}
        <div style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); border-radius: 10px; padding: 1rem; margin-bottom: 1.5rem; text-align: center; color: var(--danger); font-weight: 600;">
            ❌ {{ error }}
        </div>
        {% endif %}

        <form method="POST" style="margin-bottom: 1.5rem;">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required 
                       style="transition: all 0.3s ease;"
                       onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px rgba(255, 77, 0, 0.1)'"
                       onblur="this.style.borderColor='#333'; this.style.boxShadow='none'">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">Password</label>
                <input type="password" name="password" placeholder="Enter your password" required
                       style="transition: all 0.3s ease;"
                       onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px rgba(255, 77, 0, 0.1)'"
                       onblur="this.style.borderColor='#333'; this.style.boxShadow='none'">
            </div>

            <button type="submit" style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); font-size: 1.1rem; padding: 14px; border-radius: 12px; transition: all 0.3s ease;">
                🔓 Login to Dashboard
            </button>
        </form>

        <div style="text-align: center; color: var(--text-muted); font-size: 0.875rem; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
            <p>© 2025 Mahadev Fitness Club</p>
        </div>
    </div>
</div>

<!-- Unmute music on first click -->
<script>
document.addEventListener("click", function () {
    const music = document.getElementById("bg-music");
    if (music) {
        music.muted = false;
        music.volume = 0.4;
        music.play().catch(err => console.log("Play blocked:", err));
    }
}, { once: true });

// Add hover effect to button
const btn = document.querySelector('button[type="submit"]');
btn.addEventListener('mouseenter', function() {
    this.style.transform = 'translateY(-2px)';
    this.style.boxShadow = '0 0 20px rgba(255, 77, 0, 0.4), 0 4px 16px rgba(0, 0, 0, 0.4)';
});
btn.addEventListener('mouseleave', function() {
    this.style.transform = 'translateY(0)';
    this.style.boxShadow = 'none';
});
</script>

</body>
</html>
